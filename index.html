<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Android Web Loader</title>

<script src="lib/v86.js"></script>

<style>
body{
    background:#000;
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:20px;
    font-family:sans-serif;
}

#screen_container{
    border:2px solid #333;
    background:#111;
    width:800px;
    height:600px;
    cursor:crosshair;
}

#screen_container.drag-over{
    border:2px dashed #3b82f6;
    box-shadow:0 0 20px #3b82f6;
}

#status{
    font-size:14px;
    color:#aaa;
    margin-bottom:10px;
    background:#222;
    padding:10px 20px;
    border-radius:8px;
    border:1px solid #444;
}
</style>
</head>

<body>

<h2>Android Web Loader</h2>

<div id="status">Connecting to engine...</div>

<!-- REQUIRED structure for v86 -->
<div id="screen_container">
    <div style="white-space: pre; font-family: monospace;"></div>
    <canvas style="display:none"></canvas>
</div>

<script>

function startEmulator(){

    const status = document.getElementById("status");

    if(typeof V86Starter === "undefined"){
        status.innerHTML="<b style='color:#ff4444'>Engine not ready. Retrying...</b>";
        setTimeout(startEmulator,1000);
        return;
    }

    status.innerText="Engine active. Booting Android (1-3 minutes)...";

    const emulator = new V86Starter({

        wasm_path:"lib/v86.wasm",

        memory_size:128*1024*1024,
        vga_memory_size:8*1024*1024,

        screen_container:document.getElementById("screen_container"),

        bios:{url:"roms/seabios.bin"},
        vga_bios:{url:"roms/vgabios.bin"},

        cdrom:{url:"roms/android.iso"},

        autostart:true
    });

    setupDragAndDrop(emulator,status);
}

function setupDragAndDrop(emulator,status){

    const container=document.getElementById("screen_container");

    ["dragenter","dragover","dragleave","drop"].forEach(evt=>{
        container.addEventListener(evt,function(e){
            e.preventDefault();
            e.stopPropagation();
        });
    });

    container.addEventListener("dragover",()=>{
        container.classList.add("drag-over");
    });

    container.addEventListener("dragleave",()=>{
        container.classList.remove("drag-over");
    });

    container.addEventListener("drop",(e)=>{

        container.classList.remove("drag-over");

        const file=e.dataTransfer.files[0];
        if(!file)return;

        status.innerText="Uploading "+file.name+"...";

        const reader=new FileReader();

        reader.onload=function(event){

            emulator.create_file(
                "/"+file.name,
                new Uint8Array(event.target.result)
            );

            status.style.color="#4ade80";
            status.innerText="Uploaded! Install with: pm install /"+file.name;

            alert("File uploaded. Install inside Android terminal.");
        };

        reader.readAsArrayBuffer(file);
    });
}

window.onload=startEmulator;

</script>

</body>
</html>
