<script src="lib/v86.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function(){

    const status = document.getElementById("status");

    if (!status){
        console.error("Status element not found");
        return;
    }

    if (!window.V86Starter){
        status.innerHTML = "❌ Engine failed to load";
        return;
    }

    status.innerHTML = "✅ Engine Loaded. Booting Android...";

    new V86Starter({
        wasm_path: "lib/v86.wasm",
        vga_js: "lib/vga.js",

        memory_size: 512 * 1024 * 1024,

        screen_container: document.getElementById("screen_container"),

        bios: { url: "roms/seabios.bin" },
        vga_bios: { url: "roms/vgabios.bin" },
        cdrom: { url: "roms/android.iso" },

        autostart: true
    });

});
</script>
