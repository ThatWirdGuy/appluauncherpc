<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Android Web Loader</title>

<script src="./lib/v86.js"></script>

<style>
body{
    background:#000;
    color:#fff;
    display:flex;
    flex-direction:column;
    align-items:center;
    font-family:sans-serif;
    padding-top:20px;
}

#screen_container{
    border:2px solid #333;
    background:#111;
    width:800px;
    height:600px;
}

#screen_container.drag{
    border:2px dashed #3b82f6;
    box-shadow:0 0 15px #3b82f6;
}

#status{
    margin-bottom:12px;
    background:#222;
    padding:10px 20px;
    border-radius:6px;
    border:1px solid #444;
    font-size:14px;
}
</style>
</head>

<body>

<h2>Android Web Loader</h2>
<div id="status">Connecting to engine...</div>

<div id="screen_container">
    <canvas id="screen"></canvas>
</div>

<script>

function startEmulator(){

    const status = document.getElementById("status");

    if(typeof V86Starter === "undefined"){
        status.innerHTML = "<span style='color:red'>Engine not ready. Retrying...</span>";
        setTimeout(startEmulator,1000);
        return;
    }

    status.innerText = "Engine active. Booting Android (1-3 minutes)...";

    const emulator = new V86Starter({

        wasm_path:"./lib/v86.wasm",

        memory_size:256*1024*1024,
        vga_memory_size:16*1024*1024,

        screen_container:document.getElementById("screen_container"),

        bios:{url:"./roms/seabios.bin"},
        vga_bios:{url:"./roms/vgabios.bin"},

        cdrom:{url:"./roms/android.iso"},

        autostart:true
    });

    setupDragDrop(emulator,status);
}

function setupDragDrop(emulator,status){

    const container=document.getElementById("screen_container");

    ["dragenter","dragover","dragleave","drop"].forEach(e=>{
        container.addEventListener(e,function(ev){
            ev.preventDefault();
            ev.stopPropagation();
        });
    });

    container.addEventListener("dragover",()=>{
        container.classList.add("drag");
    });

    container.addEventListener("dragleave",()=>{
        container.classList.remove("drag");
    });

    container.addEventListener("drop",(e)=>{

        container.classList.remove("drag");

        const file=e.dataTransfer.files[0];
        if(!file)return;

        status.innerText="Uploading "+file.name+"...";

        const reader=new FileReader();

        reader.onload=function(ev){

            emulator.create_file(
                "/"+file.name,
                new Uint8Array(ev.target.result)
            );

            status.style.color="#4ade80";
            status.innerText="Upload complete: "+file.name+
            " | Install using: pm install /"+file.name;

            alert("File uploaded to Android virtual filesystem.");
        };

        reader.readAsArrayBuffer(file);
    });
}

window.onload=startEmulator;

</script>

</body>
</html>
