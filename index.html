<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>APK Web Loader</title>
    <link rel="stylesheet" href="style.css">
    <script src="./lib/v86.js"></script>
</head>
<body style="background-color: #000; color: white; display: flex; flex-direction: column; align-items: center;">

    <h2>Android Web Loader</h2>
    <p style="font-size: 12px; color: #888;">Note: First boot takes 3-5 minutes. Please wait.</p>

    <div id="screen_container" style="border: 2px solid #333;">
        <div style="white-space: pre; font-family: monospace"></div>
        <canvas></canvas>
    </div>

    <script>
        window.onload = function() {
            var emulator = new V86Starter({
                wasm_path: "./lib/v86.wasm",
                memory_size: 512 * 1024 * 1024, // 512MB RAM
                vga_js: "./lib/vga.js",
                
                // Connecting to your ROMS folder
                bios: { url: "./roms/seabios.bin" },
                vga_bios: { url: "./roms/vgabios.bin" },
                cdrom: { url: "./roms/android-x86-1.6-r2.iso" },
                
                autostart: true,
                screen_container: document.getElementById("screen_container"),
            });
        };
    </script>
</body>
</html>
