<script>
    window.onload = function() {
        // 1. Initialize the Emulator
        var emulator = new V86Starter({
            wasm_path: "./lib/v86.wasm",
            memory_size: 512 * 1024 * 1024,
            vga_js: "./lib/vga.js",
            bios: { url: "./roms/seabios.bin" },
            vga_bios: { url: "./roms/vgabios.bin" },
            cdrom: { url: "./roms/android-x86-1.6-r2.iso" },
            autostart: true,
            screen_container: document.getElementById("screen_container"),
        });

        var container = document.getElementById("screen_container");
        var status = document.getElementById("status");

        // 2. Drag & Drop Handlers
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            container.addEventListener(eventName, e => {
                e.preventDefault();
                e.stopPropagation();
            }, false);
        });

        container.addEventListener('dragover', () => container.style.borderColor = "#3b82f6");
        container.addEventListener('dragleave', () => container.style.borderColor = "#333");

        // 3. The "Load APK" Logic
        container.addEventListener('drop', (e) => {
            container.style.borderColor = "#333";
            var file = e.dataTransfer.files[0];
            
            if (file) {
                status.innerText = "Uploading " + file.name + " to Android...";
                
                var reader = new FileReader();
                reader.onload = function(event) {
                    // This command injects the file into the virtual system's root folder
                    emulator.create_file("/" + file.name, new Uint8Array(event.target.result));
                    status.innerText = "File " + file.name + " ready! Use Terminal to install.";
                    alert("Uploaded! Use Android Terminal to install: pm install /" + file.name);
                };
                reader.readAsArrayBuffer(file);
            }
        });
    };
</script>
