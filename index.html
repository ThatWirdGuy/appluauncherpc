<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>APK Web Loader</title>
    <script src="./lib/v86.js"></script>
    <style>
        body { background-color: #000; color: white; display: flex; flex-direction: column; align-items: center; padding-top: 20px; font-family: sans-serif; }
        #screen_container { border: 2px solid #333; background: #111; width: 800px; height: 600px; }
        #screen_container.drag-over { border: 2px dashed #3b82f6 !important; }
        #status { font-size: 14px; color: #aaa; margin-bottom: 10px; background: #222; padding: 5px 15px; border-radius: 4px; }
    </style>
</head>
<body>

    <h2>Android Web Loader</h2>
    <p id="status">Initializing...</p>

    <div id="screen_container">
        <div style="white-space: pre; font-family: monospace"></div>
        <canvas></canvas>
    </div>

    <script>
        window.onload = function() {
            const statusText = document.getElementById("status");

            // Verify V86 is loaded
            if (typeof V86Starter === "undefined") {
                statusText.innerHTML = "<b style='color:red;'>Waiting for engine...</b> If this stays, press Ctrl+F5.";
                setTimeout(window.onload, 1000);
                return;
            }

            statusText.innerText = "Engine Linked! Booting Android...";

            var emulator = new V86Starter({
                wasm_path: "./lib/v86.wasm",
                memory_size: 512 * 1024 * 1024,
                vga_js: "./lib/vga.js",
                bios: { url: "./roms/seabios.bin" },
                vga_bios: { url: "./roms/vgabios.bin" },
                cdrom: { url: "./roms/android.iso" },
                autostart: true,
                screen_container: document.getElementById("screen_container"),
            });

            // Drag and Drop Logic
            var container = document.getElementById("screen_container");
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
                container.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); });
            });

            container.addEventListener('dragover', () => container.classList.add('drag-over'));
            container.addEventListener('dragleave', () => container.classList.remove('drag-over'));

            container.addEventListener('drop', (e) => {
                container.classList.remove('drag-over');
                var file = e.dataTransfer.files[0];
                if (file) {
                    statusText.innerText = "Injecting " + file.name + "...";
                    var reader = new FileReader();
                    reader.onload = function(event) {
                        emulator.create_file("/" + file.name, new Uint8Array(event.target.result));
                        statusText.innerText = "Uploaded! Use 'pm install /" + file.name + "' in Terminal.";
                        alert("File ready for installation!");
                    };
                    reader.readAsArrayBuffer(file);
                }
            });
        };
    </script>
</body>
</html>
